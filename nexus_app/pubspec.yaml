# ================================================================
# The Nexus of Power — pubspec.yaml
# ================================================================
name: nexus_app
description: "The Nexus of Power — Forge, challenge, and command your best self."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2

  # ── State Management ────────────────────────────────────────
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  get: ^4.6.6
  provider: ^6.1.2

  # ── Firebase ────────────────────────────────────────────────
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_database: ^12.1.4
  cloud_functions: ^6.0.7

  # ── Monetization: RevenueCat ────────────────────────────────
  purchases_flutter: ^9.14.0

  # ── Networking ──────────────────────────────────────────────
  dio: ^5.7.0

  # ── Local Persistence ───────────────────────────────────────
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── UI & Animation ──────────────────────────────────────────
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # ── Utilities ───────────────────────────────────────────────
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^9.2.1
  injectable: ^2.5.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  bloc_test: ^10.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.3
  json_serializable: ^6.8.0
  injectable_generator: ^2.7.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # assets and fonts: add after running `flutterfire configure` and placing
  # your asset files under assets/images/, assets/animations/ etc.
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
