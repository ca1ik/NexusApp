name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: nexus_app/pubspec.yaml

      - name: Install dependencies
        working-directory: nexus_app
        run: flutter pub get

      - name: Run analyzer
        working-directory: nexus_app
        run: flutter analyze --no-fatal-infos

      - name: Generate mocks (build_runner)
        working-directory: nexus_app
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        working-directory: nexus_app
        run: flutter test --coverage

  build-apk:
    name: Build Release APK
    needs: analyze-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: nexus_app/pubspec.yaml

      - name: Install dependencies
        working-directory: nexus_app
        run: flutter pub get

      - name: Build release APK
        working-directory: nexus_app
        run: |
          flutter build apk --release \
            --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --dart-define=PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }} \
            --dart-define=PINECONE_HOST=${{ secrets.PINECONE_HOST }} \
            --dart-define=REVENUE_CAT_API_KEY=${{ secrets.REVENUE_CAT_API_KEY }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-app-release
          path: nexus_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
